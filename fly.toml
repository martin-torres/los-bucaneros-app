app = "dulceria-pocketbase"
primary_region = "iad"

[build]
  image = "ghcr.io/muchobien/pocketbase:latest"

[env]
  PB_ENCRYPTION_KEY = ""

[mounts]
  source = "pb_data"
  destination = "/pb_data"

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
