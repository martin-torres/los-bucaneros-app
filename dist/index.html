<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" id="theme-color" content="#C53030">
    <meta name="description" content="Los Bucaneros - BBQ Ahumado Artesanal, Monterrey">
    <meta name="apple-mobile-web-app-title" content="Los Bucaneros">
    <title id="app-title">Los Bucaneros</title>
    <meta name="apple-mobile-web-app-title" content="Los Bucaneros">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/pwa-512x512.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #fdfcfb;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-10px); }
          75% { transform: translateX(10px); }
        }
        .animate-shake {
          animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
          border-color: #ef4444 !important;
        }
    </style>
  <script type="module" crossorigin src="/assets/index-Cf2-1IgV.js"></script>
<link rel="manifest" href="/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/registerSW.js"></script></head>
<body>
    <div id="root"></div>
    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('Service Worker registered:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }

        // Dynamic theme color from localStorage (set by React app)
        (function() {
            const storedColor = localStorage.getItem('theme-primary-color');
            if (storedColor) {
                document.getElementById('theme-color').setAttribute('content', storedColor);
            }
            const storedTitle = localStorage.getItem('theme-app-title');
            if (storedTitle) {
                document.getElementById('app-title').textContent = storedTitle;
            }
        })();
    </script>
</body>
</html>
